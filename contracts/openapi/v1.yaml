openapi: 3.1.0
info:
  title: Slack Off API
  version: 0.1.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    Health:
      type: object
      required: [ok, service, requestId, traceId]
      properties:
        ok:
          type: boolean
        service:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    UserSummary:
      type: object
      required: [id, displayName, stats]
      properties:
        id:
          type: string
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        stats:
          type: object
          required: [totalSessions, currentStreakDays, drawChances, drawProgress]
          properties:
            totalSessions:
              type: integer
            currentStreakDays:
              type: integer
            drawChances:
              type: integer
            drawProgress:
              type: integer
    CheckInSession:
      type: object
      required: [id, status, startedAt, endedAt, durationSeconds, eligibleDurationSeconds, rewarded]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, completed, cancelled, invalidated]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        durationSeconds:
          type: [integer, "null"]
        eligibleDurationSeconds:
          type: [integer, "null"]
        rewarded:
          type: boolean
    CheckInFinishResult:
      type: object
      required: [session, reward]
      properties:
        session:
          $ref: "#/components/schemas/CheckInSession"
        reward:
          type: object
          required: [score, drawProgress, rewarded]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
    RewardSummary:
      type: object
      required: [score, drawProgressGranted, drawProgress, drawChancesGranted, achievementsUnlocked]
      properties:
        score:
          type: integer
        drawProgressGranted:
          type: integer
        drawProgress:
          type: integer
        drawChancesGranted:
          type: integer
        achievementsUnlocked:
          type: array
          items:
            type: string
    LeaderboardItem:
      type: object
      required: [rank, userId, displayName, score, reactions]
      properties:
        rank:
          type: integer
        userId:
          type: [string, "null"]
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        score:
          type: integer
        reactions:
          type: object
          required: [tissue, like]
          properties:
            tissue:
              type: integer
            like:
              type: integer
    LeaderboardResponse:
      type: object
      required: [window, windowStart, scope, suppressed, suppressionReason, items, currentUser]
      properties:
        window:
          type: string
          enum: [daily, weekly, monthly, all_time]
        windowStart:
          type: string
          format: date-time
        scope:
          type: string
          enum: [global, friends, squad, company]
        suppressed:
          type: boolean
        suppressionReason:
          type: [string, "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardItem"
        currentUser:
          anyOf:
            - $ref: "#/components/schemas/LeaderboardItem"
            - type: "null"
    SocialSummary:
      type: object
      required: [friendCode, friends, squad, company, reactions]
      properties:
        friendCode:
          type: string
        friends:
          type: array
          items:
            type: object
            required: [userId, displayName]
            properties:
              userId:
                type: string
              displayName:
                type: string
        squad:
          type: [object, "null"]
          properties:
            id: { type: string }
            name: { type: string }
            inviteCode: { type: string }
            memberCount: { type: integer }
        company:
          type: [object, "null"]
          properties:
            id: { type: string }
            name: { type: string }
            inviteCode: { type: string }
            anonymousAlias: { type: string }
            memberCount: { type: integer }
        reactions:
          type: object
          required: [dailyLimit, resetTimezone]
          properties:
            dailyLimit: { type: integer }
            resetTimezone: { type: string }
    ProgressionGoal:
      type: object
      required: [code, title, description, current, target, unit, completed]
      properties:
        code:
          type: string
          enum: [check_in, activity, bean_draw, rest_minutes, active_days]
        title:
          type: string
        description:
          type: string
        current:
          type: integer
          minimum: 0
        target:
          type: integer
          minimum: 1
        unit:
          type: string
          enum: [times, minutes, days]
        completed:
          type: boolean
    ProgressionGoalPeriod:
      type: object
      required: [period, periodStart, periodEnd, completed, total, allCompleted, rewardClaimed, claimedAt, reward, goals]
      properties:
        period:
          type: string
          enum: [daily, weekly]
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        completed:
          type: integer
        total:
          type: integer
        allCompleted:
          type: boolean
        rewardClaimed:
          type: boolean
        claimedAt:
          type: [string, "null"]
          format: date-time
        reward:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        goals:
          type: array
          items:
            $ref: "#/components/schemas/ProgressionGoal"
    ProgressionClaimResult:
      type: object
      required: [period, awarded, claimedAt, reward, progression]
      properties:
        period:
          type: string
          enum: [daily, weekly]
        awarded:
          type: boolean
        claimedAt:
          type: string
          format: date-time
        reward:
          type: object
          required: [score, drawProgress, drawChancesGranted]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
        progression:
          type: object
          required: [level, experience, currentLevelExperience, nextLevelExperience, progressPercent, previousLevel, currentLevel, leveledUp]
          properties:
            level:
              type: integer
            experience:
              type: integer
            currentLevelExperience:
              type: integer
            nextLevelExperience:
              type: integer
            progressPercent:
              type: integer
            previousLevel:
              type: integer
            currentLevel:
              type: integer
            leveledUp:
              type: boolean
    ProgressionSummary:
      type: object
      required:
        - level
        - experience
        - currentLevelExperience
        - nextLevelExperience
        - progressPercent
        - currentStreakDays
        - longestStreakDays
        - lifetime
        - dailyGoals
        - weeklyGoals
      properties:
        level:
          type: integer
        experience:
          type: integer
        currentLevelExperience:
          type: integer
        nextLevelExperience:
          type: integer
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        currentStreakDays:
          type: integer
        longestStreakDays:
          type: integer
        lifetime:
          type: object
          required:
            - totalSessions
            - eligibleRestMinutes
            - completedActivities
            - collectedBeanTypes
            - unlockedAchievements
          properties:
            totalSessions:
              type: integer
            eligibleRestMinutes:
              type: integer
            completedActivities:
              type: integer
            collectedBeanTypes:
              type: integer
            unlockedAchievements:
              type: integer
        dailyGoals:
          $ref: "#/components/schemas/ProgressionGoalPeriod"
        weeklyGoals:
          $ref: "#/components/schemas/ProgressionGoalPeriod"
    Bean:
      type: object
      required: [id, code, name, rarity, theme, description, quantity, owned]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        theme:
          type: string
          enum: [office, restroom, daydream]
        description:
          type: string
        quantity:
          type: integer
        owned:
          type: boolean
    BeanCollection:
      type: object
      required: [drawChances, drawProgress, fragments, fragmentExchangeCost, pityCount, pityThreshold, beans, themes, combinations, showcase]
      properties:
        drawChances:
          type: integer
        drawProgress:
          type: integer
        fragments:
          type: integer
        fragmentExchangeCost:
          type: integer
        pityCount:
          type: integer
        pityThreshold:
          type: integer
        beans:
          type: array
          items:
            $ref: "#/components/schemas/Bean"
        themes:
          type: array
          items:
            type: object
            required: [theme, collected, total]
            properties:
              theme:
                type: string
                enum: [office, restroom, daydream]
              collected:
                type: integer
              total:
                type: integer
        combinations:
          type: array
          items:
            type: object
            required: [code, name, owned, required, completed]
            properties:
              code:
                type: string
              name:
                type: string
              owned:
                type: integer
              required:
                type: integer
              completed:
                type: boolean
        showcase:
          type: array
          items:
            type: object
            required: [position, bean]
            properties:
              position:
                type: integer
              bean:
                $ref: "#/components/schemas/Bean"
    BeanDrawResult:
      type: object
      required: [bean, duplicate, fragmentsGranted, pityTriggered, pityCount, remainingDrawChances]
      properties:
        bean:
          $ref: "#/components/schemas/Bean"
        duplicate:
          type: boolean
        fragmentsGranted:
          type: integer
        pityTriggered:
          type: boolean
        pityCount:
          type: integer
        remainingDrawChances:
          type: integer
        achievementsUnlocked:
          type: array
          items:
            $ref: "#/components/schemas/AchievementUnlock"
    AchievementUnlock:
      type: object
      required: [id, code, name, unlockedAt, rewards]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        unlockedAt:
          type: string
          format: date-time
        rewards:
          type: object
          required: [score, drawProgress, drawChances, cosmetic]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChances:
              type: integer
            cosmetic:
              type: [string, "null"]
    Achievement:
      type: object
      required: [id, code, name, description, ruleType, rewardConfig, progress, unlockedAt, rewardClaimedAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [first_checkin, streak, total_duration, activity_count, collection_count, weekly_top_rank]
        rewardConfig:
          type: object
          additionalProperties: true
        progress:
          type: object
          required: [current, target, unit, percent, completed]
          properties:
            current:
              type: integer
              minimum: 0
            target:
              type: integer
              minimum: 1
            unit:
              type: string
              enum: [count, days, minutes, rank]
            percent:
              type: integer
              minimum: 0
              maximum: 100
            completed:
              type: boolean
        unlockedAt:
          type: [string, "null"]
          format: date-time
        rewardClaimedAt:
          type: [string, "null"]
          format: date-time
    AchievementList:
      type: object
      required: [achievements]
      properties:
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
    Cosmetic:
      type: object
      required: [id, code, name, description, cosmeticType, rarity]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        cosmeticType:
          type: string
          enum: [badge, title]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
    OwnedCosmetic:
      allOf:
        - $ref: "#/components/schemas/Cosmetic"
        - type: object
          required: [unlockedAt, equipped]
          properties:
            unlockedAt:
              type: string
              format: date-time
            equipped:
              type: boolean
    CosmeticInventory:
      type: object
      required: [equippedBadge, equippedTitle, cosmetics]
      properties:
        equippedBadge:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        equippedTitle:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        cosmetics:
          type: array
          items:
            $ref: "#/components/schemas/OwnedCosmetic"
    CosmeticEquipResult:
      type: object
      required: [cosmetic]
      properties:
        cosmetic:
          $ref: "#/components/schemas/Cosmetic"
    ActivityAssignment:
      type: object
      required: [assignmentId, code, title, description, category, difficulty, status, rewardPreview, assignedAt, completedAt, expiresAt, rewarded]
      properties:
        assignmentId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        status:
          type: string
          enum: [active, completed, skipped, expired]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        assignedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        rewarded:
          type: boolean
        recommendationReason:
          type: string
          enum: [PREFERRED_CATEGORY, TRY_SOMETHING_NEW, MATCHES_HISTORY, AVAILABLE_NOW, ACTIVE_ASSIGNMENT]
    ActivityCatalogItem:
      type: object
      required: [templateId, code, title, description, category, difficulty, rewardPreview, eligible, cooldownRemainingSeconds, completedCount, lastCompletedAt, checkedAt]
      properties:
        templateId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        eligible:
          type: boolean
        cooldownRemainingSeconds:
          type: integer
          minimum: 0
        completedCount:
          type: integer
          minimum: 0
        lastCompletedAt:
          type: [string, "null"]
          format: date-time
        checkedAt:
          type: string
          format: date-time
    ActivityCatalog:
      type: object
      required: [selectedCategory, categories, items]
      properties:
        selectedCategory:
          type: [string, "null"]
          enum: [rest, game, office_theater, physical, imagination, null]
        categories:
          type: array
          items:
            type: string
            enum: [rest, game, office_theater, physical, imagination]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityCatalogItem"
    ActivityHistory:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityAssignment"
    ActivityCompleteResult:
      type: object
      required: [assignment, reward]
      properties:
        assignment:
          $ref: "#/components/schemas/ActivityAssignment"
        reward:
          type: object
          required: [score, drawProgress, drawChancesGranted, rewarded, reason, achievementsUnlocked]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            reason:
              type: [string, "null"]
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
paths:
  /health:
    get:
      security: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Service health
  /v1/auth/me:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile summary
  /v1/me/profile:
    patch:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated profile
  /v1/check-ins:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
                theme:
                  type: string
                  enum: [office, restroom, daydream]
      responses:
        "200":
          description: Started check-in
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInSession"
                  error:
                    type: "null"
        "409":
          description: Active check-in already exists
  /v1/check-ins/{id}/finish:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Finished check-in with rewards
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInFinishResult"
                  error:
                    type: "null"
        "404":
          description: Check-in not found
  /v1/check-ins/active:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Active check-in or null
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    anyOf:
                      - $ref: "#/components/schemas/CheckInSession"
                      - type: "null"
                  error:
                    type: "null"
  /v1/leaderboards:
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: window
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, all_time]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [global, friends, squad, company]
            default: global
      responses:
        "200":
          description: Leaderboard page and current user rank context
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaderboardResponse"
                  error:
                    type: "null"
  /v1/social/summary:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Friend code, relationships, and group memberships
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/SocialSummary"
                  error:
                    type: "null"
  /v1/social/friends:
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [friendCode]
              properties:
                friendCode: { type: string }
      responses:
        "200":
          description: Updated social summary
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/SocialSummary"
                  error: { type: "null" }
  /v1/social/reactions:
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientUserId, reactionType]
              properties:
                recipientUserId: { type: string, format: uuid }
                reactionType:
                  type: string
                  enum: [tissue, like]
      responses:
        "200":
          description: Reaction result and aggregate counts
  /v1/progression/summary:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Authenticated user progression summary
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ProgressionSummary"
                  error:
                    type: "null"
  /v1/progression/{period}/claim:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
        - name: period
          in: path
          required: true
          schema:
            type: string
            enum: [daily, weekly]
      responses:
        "200":
          description: Goal period reward claim result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ProgressionClaimResult"
                  error:
                    type: "null"
        "409":
          description: Goal period is incomplete
  /v1/beans/collection:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: User bean collection
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/BeanCollection"
                  error:
                    type: "null"
  /v1/beans/draw:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Bean draw result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/BeanDrawResult"
                  error:
                    type: "null"
        "409":
          description: No draw chance available
  /v1/beans/fragments/exchange:
    post:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fragment exchange result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
