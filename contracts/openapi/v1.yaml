openapi: 3.1.0
info:
  title: Slack Off API
  version: 0.1.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    Health:
      type: object
      required: [ok, service, requestId, traceId]
      properties:
        ok:
          type: boolean
        service:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    UserSummary:
      type: object
      required: [id, displayName, stats]
      properties:
        id:
          type: string
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        stats:
          type: object
          required: [totalSessions, currentStreakDays, drawChances, drawProgress]
          properties:
            totalSessions:
              type: integer
            currentStreakDays:
              type: integer
            drawChances:
              type: integer
            drawProgress:
              type: integer
    CheckInSession:
      type: object
      required: [id, status, startedAt, endedAt, durationSeconds, eligibleDurationSeconds, rewarded]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, completed, cancelled, invalidated]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        durationSeconds:
          type: [integer, "null"]
        eligibleDurationSeconds:
          type: [integer, "null"]
        rewarded:
          type: boolean
    CheckInFinishResult:
      type: object
      required: [session, reward]
      properties:
        session:
          $ref: "#/components/schemas/CheckInSession"
        reward:
          type: object
          required: [score, drawProgress, rewarded]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
    RewardSummary:
      type: object
      required: [score, drawProgressGranted, drawProgress, drawChancesGranted, achievementsUnlocked]
      properties:
        score:
          type: integer
        drawProgressGranted:
          type: integer
        drawProgress:
          type: integer
        drawChancesGranted:
          type: integer
        achievementsUnlocked:
          type: array
          items:
            type: string
    LeaderboardItem:
      type: object
      required: [rank, userId, displayName, score, reactions]
      properties:
        rank:
          type: integer
        userId:
          type: [string, "null"]
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        score:
          type: integer
        reactions:
          type: object
          required: [tissue, like]
          properties:
            tissue:
              type: integer
            like:
              type: integer
    LeaderboardResponse:
      type: object
      required: [window, windowStart, scope, suppressed, suppressionReason, items, currentUser]
      properties:
        window:
          type: string
          enum: [daily, weekly, monthly, all_time]
        windowStart:
          type: string
          format: date-time
        scope:
          type: string
          enum: [global, friends, squad, company]
        suppressed:
          type: boolean
        suppressionReason:
          type: [string, "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardItem"
        currentUser:
          anyOf:
            - $ref: "#/components/schemas/LeaderboardItem"
            - type: "null"
    SocialSummary:
      type: object
      required: [friendCode, friends, squad, company, reactions]
      properties:
        friendCode:
          type: string
        friends:
          type: array
          items:
            type: object
            required: [userId, displayName]
            properties:
              userId:
                type: string
              displayName:
                type: string
        squad:
          type: [object, "null"]
          properties:
            id: { type: string }
            name: { type: string }
            inviteCode: { type: string }
            memberCount: { type: integer }
        company:
          type: [object, "null"]
          properties:
            id: { type: string }
            name: { type: string }
            inviteCode: { type: string }
            anonymousAlias: { type: string }
            memberCount: { type: integer }
        reactions:
          type: object
          required: [dailyLimit, sentToday, remainingToday, resetTimezone]
          properties:
            dailyLimit: { type: integer }
            sentToday: { type: integer }
            remainingToday: { type: integer }
            resetTimezone: { type: string }
    SocialReactionResult:
      type: object
      required: [created, reactionType, counts, remainingToday, resultTitle, resultCopy]
      properties:
        created:
          type: boolean
        reactionType:
          type: string
          enum: [tissue, like]
        counts:
          type: object
          required: [tissue, like]
          properties:
            tissue: { type: integer }
            like: { type: integer }
        remainingToday:
          type: integer
        resultTitle:
          type: string
        resultCopy:
          type: string
    ProgressionGoal:
      type: object
      required: [code, title, description, current, target, unit, completed]
      properties:
        code:
          type: string
          enum: [check_in, activity, bean_draw, rest_minutes, active_days]
        title:
          type: string
        description:
          type: string
        current:
          type: integer
          minimum: 0
        target:
          type: integer
          minimum: 1
        unit:
          type: string
          enum: [times, minutes, days]
        completed:
          type: boolean
    ProgressionGoalPeriod:
      type: object
      required: [period, periodStart, periodEnd, completed, total, allCompleted, rewardClaimed, claimedAt, reward, goals]
      properties:
        period:
          type: string
          enum: [daily, weekly]
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        completed:
          type: integer
        total:
          type: integer
        allCompleted:
          type: boolean
        rewardClaimed:
          type: boolean
        claimedAt:
          type: [string, "null"]
          format: date-time
        reward:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        goals:
          type: array
          items:
            $ref: "#/components/schemas/ProgressionGoal"
    ProgressionClaimResult:
      type: object
      required: [period, awarded, claimedAt, reward, progression]
      properties:
        period:
          type: string
          enum: [daily, weekly]
        awarded:
          type: boolean
        claimedAt:
          type: string
          format: date-time
        reward:
          type: object
          required: [score, drawProgress, drawChancesGranted]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
        progression:
          type: object
          required: [level, experience, currentLevelExperience, nextLevelExperience, progressPercent, previousLevel, currentLevel, leveledUp]
          properties:
            level:
              type: integer
            experience:
              type: integer
            currentLevelExperience:
              type: integer
            nextLevelExperience:
              type: integer
            progressPercent:
              type: integer
            previousLevel:
              type: integer
            currentLevel:
              type: integer
            leveledUp:
              type: boolean
    ProgressionSummary:
      type: object
      required:
        - level
        - experience
        - currentLevelExperience
        - nextLevelExperience
        - progressPercent
        - currentStreakDays
        - longestStreakDays
        - lifetime
        - dailyGoals
        - weeklyGoals
        - nextActions
      properties:
        level:
          type: integer
        experience:
          type: integer
        currentLevelExperience:
          type: integer
        nextLevelExperience:
          type: integer
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        currentStreakDays:
          type: integer
        longestStreakDays:
          type: integer
        lifetime:
          type: object
          required:
            - totalSessions
            - eligibleRestMinutes
            - completedActivities
            - collectedBeanTypes
            - unlockedAchievements
          properties:
            totalSessions:
              type: integer
            eligibleRestMinutes:
              type: integer
            completedActivities:
              type: integer
            collectedBeanTypes:
              type: integer
            unlockedAchievements:
              type: integer
        dailyGoals:
          $ref: "#/components/schemas/ProgressionGoalPeriod"
        weeklyGoals:
          $ref: "#/components/schemas/ProgressionGoalPeriod"
        nextActions:
          type: array
          items:
            $ref: "#/components/schemas/ProgressionNextAction"
    ProgressionNextAction:
      type: object
      required:
        - code
        - title
        - description
        - actionLabel
        - targetSection
        - priority
        - rewardPreview
      properties:
        code:
          type: string
          enum:
            - start_check_in
            - complete_activity
            - draw_bean
            - claim_daily_reward
            - claim_weekly_reward
        title:
          type: string
        description:
          type: string
        actionLabel:
          type: string
        targetSection:
          type: string
          enum: [home, activities, beans, rankings, profile]
        priority:
          type: integer
        rewardPreview:
          anyOf:
            - type: object
              required: [score, drawProgress, drawChances]
              properties:
                score:
                  type: integer
                drawProgress:
                  type: integer
                drawChances:
                  type: integer
            - type: "null"
    Bean:
      type: object
      required: [id, code, name, rarity, theme, description, quantity, owned]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        theme:
          type: string
          enum: [office, restroom, daydream]
        description:
          type: string
        quantity:
          type: integer
        owned:
          type: boolean
    BeanCollection:
      type: object
      required: [drawChances, drawProgress, fragments, fragmentExchangeCost, pityCount, pityThreshold, summary, nextTarget, beans, themes, combinations, showcase]
      properties:
        drawChances:
          type: integer
        drawProgress:
          type: integer
        fragments:
          type: integer
        fragmentExchangeCost:
          type: integer
        pityCount:
          type: integer
        pityThreshold:
          type: integer
        summary:
          type: object
          required: [collected, total, percent, nextAction]
          properties:
            collected:
              type: integer
            total:
              type: integer
            percent:
              type: integer
              minimum: 0
              maximum: 100
            nextAction:
              type: string
        nextTarget:
          oneOf:
            - type: object
              required: [id, code, name, rarity, theme, hint]
              properties:
                id:
                  type: string
                  format: uuid
                code:
                  type: string
                name:
                  type: string
                rarity:
                  type: string
                  enum: [common, uncommon, rare, epic, legendary]
                theme:
                  type: string
                  enum: [office, restroom, daydream]
                hint:
                  type: string
            - type: "null"
        beans:
          type: array
          items:
            $ref: "#/components/schemas/Bean"
        themes:
          type: array
          items:
            type: object
            required: [theme, collected, total]
            properties:
              theme:
                type: string
                enum: [office, restroom, daydream]
              collected:
                type: integer
              total:
                type: integer
        combinations:
          type: array
          items:
            type: object
            required: [code, name, owned, required, completed]
            properties:
              code:
                type: string
              name:
                type: string
              owned:
                type: integer
              required:
                type: integer
              completed:
                type: boolean
              fishTankEffect:
                type: object
                required: [type, resourceType, label, hint, available]
                properties:
                  type:
                    type: string
                    enum: [care_flavor, bubble_style, hatch_preview]
                  resourceType:
                    $ref: "#/components/schemas/FishTankResourceType"
                  label:
                    type: string
                  hint:
                    type: string
                  available:
                    type: boolean
        showcase:
          type: array
          items:
            type: object
            required: [position, bean]
            properties:
              position:
                type: integer
              bean:
                $ref: "#/components/schemas/Bean"
    BeanDrawResult:
      type: object
      required: [bean, duplicate, fragmentsGranted, pityTriggered, pityCount, remainingDrawChances, resultTitle, resultCopy, nextHint, fishTankOutcomes]
      properties:
        bean:
          $ref: "#/components/schemas/Bean"
        duplicate:
          type: boolean
        fragmentsGranted:
          type: integer
        pityTriggered:
          type: boolean
        pityCount:
          type: integer
        remainingDrawChances:
          type: integer
        resultTitle:
          type: string
        resultCopy:
          type: string
        nextHint:
          type: string
        fishTankOutcomes:
          type: array
          items:
            $ref: "#/components/schemas/FishTankResourceOutcome"
        achievementsUnlocked:
          type: array
          items:
            $ref: "#/components/schemas/AchievementUnlock"
    AchievementUnlock:
      type: object
      required: [id, code, name, unlockedAt, rewards]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        unlockedAt:
          type: string
          format: date-time
        rewards:
          type: object
          required: [score, drawProgress, drawChances, cosmetic]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChances:
              type: integer
            cosmetic:
              type: [string, "null"]
    Achievement:
      type: object
      required: [id, code, name, description, ruleType, rewardConfig, progress, category, rarity, unlockSummary, recommendationWeight, todayFriendly, actionHint, unlockedAt, rewardClaimedAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [first_checkin, streak, total_duration, activity_count, collection_count, weekly_top_rank]
        rewardConfig:
          type: object
          additionalProperties: true
        progress:
          type: object
          required: [current, target, unit, percent, completed]
          properties:
            current:
              type: integer
              minimum: 0
            target:
              type: integer
              minimum: 1
            unit:
              type: string
              enum: [count, days, minutes, rank]
            percent:
              type: integer
              minimum: 0
              maximum: 100
            completed:
              type: boolean
        category:
          type: string
          enum: [new_user, check_in, activity, bean_draw, leaderboard, social]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        unlockSummary:
          type: string
        recommendationWeight:
          type: integer
        todayFriendly:
          type: boolean
        actionHint:
          type: object
          required: [section, label]
          properties:
            section:
              type: string
              enum: [home, activities, beans, leaderboards, profile]
            label:
              type: string
        unlockedAt:
          type: [string, "null"]
          format: date-time
        rewardClaimedAt:
          type: [string, "null"]
          format: date-time
    AchievementRecommendations:
      type: object
      required: [nearest, today, long_term]
      properties:
        nearest:
          type: array
          items:
            $ref: "#/components/schemas/AchievementRecommendation"
        today:
          type: array
          items:
            $ref: "#/components/schemas/AchievementRecommendation"
        long_term:
          type: array
          items:
            $ref: "#/components/schemas/AchievementRecommendation"
    AchievementRecommendation:
      allOf:
        - $ref: "#/components/schemas/Achievement"
        - type: object
          required: [recommendationGroup, recommendationReason, remainingEffortLabel, targetSection]
          properties:
            recommendationGroup:
              type: string
              enum: [nearest, today, long_term]
            recommendationReason:
              type: string
            remainingEffortLabel:
              type: string
            targetSection:
              type: string
              enum: [home, activities, beans, leaderboards, profile]
    AchievementList:
      type: object
      required: [achievements, recommendations]
      properties:
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
        recommendations:
          $ref: "#/components/schemas/AchievementRecommendations"
    Cosmetic:
      type: object
      required: [id, code, name, description, cosmeticType, rarity, unlockSummary]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        cosmeticType:
          type: string
          enum: [badge, title]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        unlockSummary:
          type: string
    OwnedCosmetic:
      allOf:
        - $ref: "#/components/schemas/Cosmetic"
        - type: object
          required: [owned, unlockedAt, equipped]
          properties:
            owned:
              type: boolean
            unlockedAt:
              type: [string, "null"]
              format: date-time
            equipped:
              type: boolean
    CosmeticInventory:
      type: object
      required: [equippedBadge, equippedTitle, cosmetics]
      properties:
        equippedBadge:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        equippedTitle:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        cosmetics:
          type: array
          items:
            $ref: "#/components/schemas/OwnedCosmetic"
    CosmeticEquipResult:
      type: object
      required: [cosmetic]
      properties:
        cosmetic:
          $ref: "#/components/schemas/Cosmetic"
    ActivityInteractionStep:
      type: object
      required: [id, type, title, description, required]
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - ack
            - timer
            - choice
            - mini_game
            - tap-pattern
            - shuffle-pick
            - sort
            - breath
            - reaction
            - micro-journal
            - reveal
        title:
          type: string
        description:
          type: string
        required:
          type: boolean
        durationSeconds:
          type: integer
        options:
          type: array
          items:
            type: object
            required: [id, label, resultText]
            properties:
              id:
                type: string
              label:
                type: string
              resultText:
                type: string
        correctOptionId:
          type: string
        gameCode:
          type: string
        requiredResult:
          type: string
        requiredTaps:
          type: integer
        tapLabel:
          type: string
        items:
          type: array
          items:
            type: object
            required: [id, label]
            properties:
              id:
                type: string
              label:
                type: string
              resultText:
                type: string
        correctOrder:
          type: array
          items:
            type: string
        requiredRounds:
          type: integer
        inhaleSeconds:
          type: integer
        holdSeconds:
          type: integer
        exhaleSeconds:
          type: integer
        requiredSuccessCount:
          type: integer
        reactionRounds:
          type: integer
        journalMode:
          type: string
          enum: [text, tags, both]
        textMinLength:
          type: integer
        textMaxLength:
          type: integer
        tags:
          type: array
          items:
            type: object
            required: [id, label, resultText]
            properties:
              id:
                type: string
              label:
                type: string
              resultText:
                type: string
        minTagCount:
          type: integer
        maxTagCount:
          type: integer
    ActivityInteraction:
      type: object
      required: [mode, estimatedSeconds, proofPolicy, flavorLabel, steps, completionFeedback, resultSummary]
      properties:
        mode:
          type: string
          enum: [guided]
        estimatedSeconds:
          type: integer
        proofPolicy:
          type: string
          enum: [none, optional_photo, optional_location, external_game]
        flavorLabel:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ActivityInteractionStep"
        completionFeedback:
          type: array
          items:
            type: string
        resultSummary:
          type: object
          required: [title, copy]
          properties:
            title:
              type: string
            copy:
              type: string
    ActivityInteractionSummary:
      type: object
      required:
        - stepCount
        - estimatedSeconds
        - hasTimer
        - hasChoice
        - hasMiniGame
        - hasTapPattern
        - hasShufflePick
        - hasSort
        - hasBreath
        - hasReaction
        - hasMicroJournal
        - hasReveal
        - proofPolicy
        - flavorLabel
      properties:
        stepCount:
          type: integer
        estimatedSeconds:
          type: integer
        hasTimer:
          type: boolean
        hasChoice:
          type: boolean
        hasMiniGame:
          type: boolean
        hasTapPattern:
          type: boolean
        hasShufflePick:
          type: boolean
        hasSort:
          type: boolean
        hasBreath:
          type: boolean
        hasReaction:
          type: boolean
        hasMicroJournal:
          type: boolean
        hasReveal:
          type: boolean
        proofPolicy:
          type: string
          enum: [none, optional_photo, optional_location, external_game]
        flavorLabel:
          type: string
    ActivityInteractionProgress:
      type: object
      additionalProperties: false
      properties:
        completedStepIds:
          type: array
          items:
            type: string
        timerSeconds:
          type: object
          additionalProperties:
            type: integer
        choiceAnswers:
          type: object
          additionalProperties:
            type: string
        miniGameResults:
          type: object
          additionalProperties:
            type: object
            properties:
              passed:
                type: boolean
              score:
                type: integer
        tapCounts:
          type: object
          additionalProperties:
            type: integer
        selectedOptions:
          type: object
          additionalProperties:
            type: string
        sortedItemIds:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        breathRounds:
          type: object
          additionalProperties:
            type: integer
        reactionResults:
          type: object
          additionalProperties:
            type: object
            required: [successCount, attempts]
            properties:
              successCount:
                type: integer
              attempts:
                type: integer
        journalEntries:
          type: object
          additionalProperties:
            type: object
            properties:
              text:
                type: string
              tagIds:
                type: array
                items:
                  type: string
    ActivitySkipReason:
      type: string
      enum: [too_much_work, not_interested, not_convenient, want_weirder, other]
    ActivityFeedbackType:
      type: string
      enum: [liked, neutral, dislike_similar, want_weirder, too_much_work, too_long, too_physical, shorter]
    ActivityFeedbackSource:
      type: string
      enum: [completion, skip]
    ActivityFeedbackRequest:
      type: object
      additionalProperties: false
      required: [feedbackType, source]
      properties:
        feedbackType:
          $ref: "#/components/schemas/ActivityFeedbackType"
        source:
          $ref: "#/components/schemas/ActivityFeedbackSource"
    ActivityFeedbackEvent:
      type: object
      required: [id, assignmentId, templateId, category, feedbackType, feedbackSource, skipReason, createdAt]
      properties:
        id:
          type: string
          format: uuid
        assignmentId:
          type: [string, "null"]
          format: uuid
        templateId:
          type: string
          format: uuid
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        feedbackType:
          $ref: "#/components/schemas/ActivityFeedbackType"
        feedbackSource:
          $ref: "#/components/schemas/ActivityFeedbackSource"
        skipReason:
          anyOf:
            - $ref: "#/components/schemas/ActivitySkipReason"
            - type: "null"
        createdAt:
          type: string
          format: date-time
    ActivityFeedbackResponse:
      type: object
      required: [acknowledgement, event]
      properties:
        acknowledgement:
          type: string
        event:
          $ref: "#/components/schemas/ActivityFeedbackEvent"
    ActivityPresentation:
      type: object
      required: [badge, tone, accentColor, headline, scene, prompt, statLabel, statValue]
      properties:
        badge:
          type: string
        tone:
          type: string
          enum: [absurd, calm, game, physical, daydream]
        accentColor:
          type: string
        headline:
          type: string
        scene:
          type: string
        prompt:
          type: string
        statLabel:
          type: string
        statValue:
          type: string
    ActivityAssignment:
      type: object
      required: [assignmentId, code, title, description, category, difficulty, status, rewardPreview, presentation, interaction, interactionSummary, assignedAt, completedAt, expiresAt, rewarded]
      properties:
        assignmentId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        status:
          type: string
          enum: [active, completed, skipped, expired]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        presentation:
          $ref: "#/components/schemas/ActivityPresentation"
        interaction:
          $ref: "#/components/schemas/ActivityInteraction"
        interactionSummary:
          $ref: "#/components/schemas/ActivityInteractionSummary"
        assignedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        rewarded:
          type: boolean
        recommendationReason:
          type: string
          enum: [PREFERRED_CATEGORY, TRY_SOMETHING_NEW, MATCHES_HISTORY, AVAILABLE_NOW, ACTIVE_ASSIGNMENT, LIKED_CATEGORY, SHORTER_AFTER_FEEDBACK, WEIRDER_AFTER_FEEDBACK, AVOIDED_RECENT_DISLIKE, AVOIDED_PHYSICAL]
        recommendationExplanation:
          type: string
    ActivityCatalogItem:
      type: object
      required: [templateId, code, title, description, category, difficulty, rewardPreview, presentation, interactionSummary, eligible, cooldownRemainingSeconds, completedCount, lastCompletedAt, checkedAt]
      properties:
        templateId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        presentation:
          $ref: "#/components/schemas/ActivityPresentation"
        interactionSummary:
          $ref: "#/components/schemas/ActivityInteractionSummary"
        eligible:
          type: boolean
        cooldownRemainingSeconds:
          type: integer
          minimum: 0
        completedCount:
          type: integer
          minimum: 0
        lastCompletedAt:
          type: [string, "null"]
          format: date-time
        checkedAt:
          type: string
          format: date-time
    ActivityCatalog:
      type: object
      required: [selectedCategory, categories, items]
      properties:
        selectedCategory:
          type: [string, "null"]
          enum: [rest, game, office_theater, physical, imagination, null]
        categories:
          type: array
          items:
            type: string
            enum: [rest, game, office_theater, physical, imagination]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityCatalogItem"
    ActivityHistory:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityHistorySession"
        nextCursor:
          type: [string, "null"]
    ActivityHistorySession:
      type: object
      required:
        - assignmentId
        - templateId
        - code
        - title
        - description
        - category
        - difficulty
        - status
        - presentation
        - rewardSummary
        - assignedAt
        - completedAt
        - sessionAt
        - skipReason
        - feedback
        - replayHint
      properties:
        assignmentId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        status:
          type: string
          enum: [active, completed, skipped, expired]
        flavor:
          type: string
          enum: [quick, weird, recharge, tiny_challenge, tiny_reflection]
        presentation:
          $ref: "#/components/schemas/ActivityPresentation"
        rewardSummary:
          type: object
          required: [score, drawProgress, rewarded]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            rewarded:
              type: boolean
        assignedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        sessionAt:
          type: string
          format: date-time
        skipReason:
          type: [string, "null"]
          enum: [too_much_work, not_interested, not_convenient, want_weirder, other, null]
        feedback:
          type: [object, "null"]
          required: [type, acknowledgement]
          properties:
            type:
              type: string
              enum: [liked, neutral, dislike_similar, want_weirder, too_much_work, too_long, too_physical, shorter]
            acknowledgement:
              type: string
        replayHint:
          $ref: "#/components/schemas/ActivityReplayHint"
    ActivityReplayHint:
      type: object
      required:
        - sourceAssignmentId
        - sourceTemplateId
        - preferredCategory
        - excludeTemplateId
      properties:
        sourceAssignmentId:
          type: string
          format: uuid
        sourceTemplateId:
          type: string
          format: uuid
        preferredCategory:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        preferredFlavor:
          type: [string, "null"]
          enum: [quick, weird, recharge, tiny_challenge, tiny_reflection, null]
        excludeTemplateId:
          type: string
          format: uuid
    ActivityCompleteResult:
      type: object
      required: [assignment, reward, feedback, resultTitle, resultCopy]
      properties:
        assignment:
          $ref: "#/components/schemas/ActivityAssignment"
        feedback:
          type: string
        resultTitle:
          type: string
        resultCopy:
          type: string
        stepSummaries:
          type: array
          items:
            type: string
        reward:
          type: object
          required: [score, drawProgress, drawChancesGranted, rewarded, reason, achievementsUnlocked]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            reason:
              type: [string, "null"]
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
    FishTankSummary:
      type: object
      required: [initialized, fish, displayedFish, eligibleFish, careAvailability, hatchAvailability, collection, mood, moodCopy, nextAction, resourceSummary, costs, guidance, decorations]
      properties:
        initialized:
          type: boolean
        fish:
          type: array
          items:
            $ref: "#/components/schemas/FishTankFish"
        displayedFish:
          type: array
          items:
            $ref: "#/components/schemas/FishTankFish"
        eligibleFish:
          type: array
          items:
            $ref: "#/components/schemas/FishTankFish"
        careAvailability:
          $ref: "#/components/schemas/FishTankCareAvailability"
        hatchAvailability:
          $ref: "#/components/schemas/FishTankHatchAvailability"
        collection:
          $ref: "#/components/schemas/FishCollectionSummary"
        mood:
          $ref: "#/components/schemas/TankMood"
        moodCopy:
          type: string
          deprecated: true
          description: Backward-compatible alias of mood.copy.
        nextAction:
          type: string
          enum: [initialize, feed, bubble, hatch, decor, companionship]
        resourceSummary:
          $ref: "#/components/schemas/FishTankResourceSummary"
        costs:
          type: object
          required: [feed, bubble]
          properties:
            feed:
              type: integer
              minimum: 1
            bubble:
              type: integer
              minimum: 1
        guidance:
          type: object
          required: [foodSource, bubbleSource]
          properties:
            foodSource:
              type: string
              enum: [draw, collection]
            bubbleSource:
              type: string
              enum: [draw, collection]
        decorations:
          $ref: "#/components/schemas/DecorationsSummary"
    FishTankFish:
      type: object
      required: [id, definitionId, name, rarity, theme, personality, artKey, acquiredSource, createdAt]
      properties:
        id:
          type: string
          format: uuid
        definitionId:
          type: string
          format: uuid
        name:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        theme:
          type: string
          enum: [office, restroom, daydream]
        personality:
          type: string
        artKey:
          type: string
        acquiredSource:
          type: string
        createdAt:
          type: string
          format: date-time
    FishTankCareAvailability:
      type: object
      required: [feed, bubble]
      properties:
        feed:
          type: object
          required: [available, nextAvailableAt, cooldownRemainingSeconds]
          properties:
            available:
              type: boolean
            nextAvailableAt:
              type: [string, "null"]
              format: date-time
            cooldownRemainingSeconds:
              type: integer
              minimum: 0
        bubble:
          type: object
          required: [available, nextAvailableAt, cooldownRemainingSeconds]
          properties:
            available:
              type: boolean
            nextAvailableAt:
              type: [string, "null"]
              format: date-time
            cooldownRemainingSeconds:
              type: integer
              minimum: 0
    FishTankHatchAvailability:
      type: object
      required: [available, reason, currentProgress, cost, missingProgress]
      properties:
        available:
          type: boolean
        reason:
          type: string
        currentProgress:
          type: integer
          minimum: 0
        cost:
          type: integer
          minimum: 1
        missingProgress:
          type: integer
          minimum: 0
    FishCollectionSummary:
      type: object
      required: [owned, total, percent, complete, items]
      properties:
        owned:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        percent:
          type: integer
          minimum: 0
          maximum: 100
        complete:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/FishCollectionItem"
    FishCollectionItem:
      type: object
      required: [definitionId, sourceHint, owned]
      properties:
        definitionId:
          type: string
          format: uuid
        name:
          type: [string, "null"]
        rarity:
          type: [string, "null"]
        personality:
          type: [string, "null"]
        artKey:
          type: [string, "null"]
        sourceHint:
          type: string
        owned:
          type: boolean
    HatchRequest:
      type: object
      additionalProperties: false
      required: [idempotencyKey]
      properties:
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
    HatchResult:
      type: object
      required: [success, replayed, discoveredFish, cost, outcomeCode, resultTitle, resultCopy, nextHint, tank]
      properties:
        success:
          type: boolean
        replayed:
          type: boolean
        discoveredFish:
          anyOf:
            - $ref: "#/components/schemas/FishTankFish"
            - type: "null"
        cost:
          type: integer
          minimum: 0
        outcomeCode:
          type: string
        resultTitle:
          type: string
        resultCopy:
          type: string
        nextHint:
          type: string
        tank:
          $ref: "#/components/schemas/FishTankSummary"
    CareInteractionRequest:
      type: object
      additionalProperties: false
      required: [interactionType, idempotencyKey]
      properties:
        interactionType:
          type: string
          enum: [feed, bubble]
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
    CareInteractionResult:
      type: object
      required: [success, replayed, outcomeCode, resultCopy, resourceType, cost, resourceBalance, tank]
      properties:
        success:
          type: boolean
        replayed:
          type: boolean
        outcomeCode:
          type: string
        resultCopy:
          type: string
        resourceType:
          type: string
          enum: [feed, bubble]
        cost:
          type: integer
          minimum: 0
        resourceBalance:
          type: integer
          minimum: 0
        tank:
          $ref: "#/components/schemas/FishTankSummary"
    TankMood:
      type: object
      required: [code, title, copy, ambientArtKey]
      properties:
        code:
          type: string
          enum: [idle, cozy, excited, sleepy, sparkly]
        title:
          type: string
        copy:
          type: string
        ambientArtKey:
          type: string
    EquippedDecoration:
      type: object
      required: [slot, definitionId, code, name, type, rarity, artKey]
      properties:
        slot:
          type: string
          enum: [background, plant, prop, ambient]
        definitionId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [background, plant, prop, ambient]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        artKey:
          type: string
    DecorationInventoryItem:
      type: object
      required: [definitionId, code, name, type, rarity, artKey, unlockHint, owned, equipped, slot]
      properties:
        definitionId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [background, plant, prop, ambient]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        artKey:
          type: [string, "null"]
        unlockHint:
          type: string
        owned:
          type: boolean
        equipped:
          type: boolean
        slot:
          type: string
          enum: [background, plant, prop, ambient]
    DecorationsSummary:
      type: object
      required: [equipped, inventory]
      properties:
        equipped:
          type: array
          items:
            $ref: "#/components/schemas/EquippedDecoration"
        inventory:
          type: array
          items:
            $ref: "#/components/schemas/DecorationInventoryItem"
    EquipDecorationRequest:
      type: object
      additionalProperties: false
      required: [slot, decorationDefinitionId, idempotencyKey]
      properties:
        slot:
          type: string
          enum: [background, plant, prop, ambient]
        decorationDefinitionId:
          type: string
          format: uuid
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
    EquipDecorationResult:
      type: object
      required: [success, replayed, outcomeCode, resultTitle, resultCopy, equipped, tank]
      properties:
        success:
          type: boolean
        replayed:
          type: boolean
        outcomeCode:
          type: string
        resultTitle:
          type: string
        resultCopy:
          type: string
        equipped:
          $ref: "#/components/schemas/EquippedDecoration"
        tank:
          $ref: "#/components/schemas/FishTankSummary"
    DisplayedFishReorderRequest:
      type: object
      additionalProperties: false
      required: [displayedFishIds, idempotencyKey]
      properties:
        displayedFishIds:
          type: array
          maxItems: 3
          items:
            type: string
            format: uuid
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
    DisplayedFishReorderResult:
      type: object
      required: [success, replayed, outcomeCode, resultCopy, displayedFish, tank]
      properties:
        success:
          type: boolean
        replayed:
          type: boolean
        outcomeCode:
          type: string
        resultCopy:
          type: string
        displayedFish:
          type: array
          items:
            $ref: "#/components/schemas/FishTankFish"
        tank:
          $ref: "#/components/schemas/FishTankSummary"
    FishTankCareError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [UNSUPPORTED_INTERACTION, INVALID_IDEMPOTENCY_KEY, TANK_NOT_INITIALIZED, COOLDOWN, INSUFFICIENT_FOOD, INSUFFICIENT_BUBBLE, INVALID_DISPLAY_SELECTION, DISPLAY_CAPACITY_EXCEEDED, DISPLAY_FISH_NOT_OWNED, RATE_LIMITED]
        message:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    FishTankCareErrorEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: "null"
        error:
          $ref: "#/components/schemas/FishTankCareError"
    FishTankDecorError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INVALID_IDEMPOTENCY_KEY, IDEMPOTENCY_KEY_REUSED, INVALID_DECORATION_SLOT, DECORATION_LOCKED, DECORATION_NOT_FOUND, WRONG_DECORATION_SLOT, TANK_NOT_INITIALIZED, RATE_LIMITED]
        message:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    FishTankDecorErrorEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: "null"
        error:
          $ref: "#/components/schemas/FishTankDecorError"
    FishTankResourceType:
      type: string
      enum: [food, bubble, hatch_progress]
    FishTankResourceOutcome:
      type: object
      required: [resourceType, quantity, label, copy]
      properties:
        resourceType:
          $ref: "#/components/schemas/FishTankResourceType"
        quantity:
          type: integer
          minimum: 1
        label:
          type: string
        copy:
          type: string
    FishTankResourceSummary:
      type: object
      required: [resources, totalFood, totalBubbles, totalHatchProgress]
      properties:
        resources:
          type: array
          items:
            type: object
            required: [resourceType, quantity, label]
            properties:
              resourceType:
                $ref: "#/components/schemas/FishTankResourceType"
              quantity:
                type: integer
                minimum: 0
              label:
                type: string
        totalFood:
          type: integer
          minimum: 0
        totalBubbles:
          type: integer
          minimum: 0
        totalHatchProgress:
          type: integer
          minimum: 0
paths:
  /health:
    get:
      security: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Service health
  /v1/auth/me:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile summary
  /v1/me/profile:
    patch:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated profile
  /v1/check-ins:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
                interaction:
                  $ref: "#/components/schemas/ActivityInteractionProgress"
                theme:
                  type: string
                  enum: [office, restroom, daydream]
      responses:
        "200":
          description: Started check-in
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInSession"
                  error:
                    type: "null"
        "409":
          description: Active check-in already exists
  /v1/check-ins/{id}/finish:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                interaction:
                  $ref: "#/components/schemas/ActivityInteractionProgress"
      responses:
        "200":
          description: Finished check-in with rewards
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInFinishResult"
                  error:
                    type: "null"
        "404":
          description: Check-in not found
  /v1/check-ins/active:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Active check-in or null
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    anyOf:
                      - $ref: "#/components/schemas/CheckInSession"
                      - type: "null"
                  error:
                    type: "null"
  /v1/leaderboards:
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: window
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, all_time]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [global, friends, squad, company]
            default: global
      responses:
        "200":
          description: Leaderboard page and current user rank context
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaderboardResponse"
                  error:
                    type: "null"
  /v1/social/summary:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Friend code, relationships, and group memberships
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/SocialSummary"
                  error:
                    type: "null"
  /v1/social/friends:
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [friendCode]
              properties:
                friendCode: { type: string }
      responses:
        "200":
          description: Updated social summary
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/SocialSummary"
                  error: { type: "null" }
  /v1/social/reactions:
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientUserId, reactionType]
              properties:
                recipientUserId: { type: string, format: uuid }
                reactionType:
                  type: string
                  enum: [tissue, like]
      responses:
        "200":
          description: Reaction result and aggregate counts
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/SocialReactionResult"
                  error:
                    type: "null"
  /v1/progression/summary:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Authenticated user progression summary
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ProgressionSummary"
                  error:
                    type: "null"
  /v1/progression/{period}/claim:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
        - name: period
          in: path
          required: true
          schema:
            type: string
            enum: [daily, weekly]
      responses:
        "200":
          description: Goal period reward claim result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
