openapi: 3.1.0
info:
  title: Slack Off API
  version: 0.1.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    TraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    Health:
      type: object
      required: [ok, service, requestId, traceId]
      properties:
        ok:
          type: boolean
        service:
          type: string
        requestId:
          type: string
        traceId:
          type: string
    UserSummary:
      type: object
      required: [id, displayName, stats]
      properties:
        id:
          type: string
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        stats:
          type: object
          required: [totalSessions, currentStreakDays, drawChances, drawProgress]
          properties:
            totalSessions:
              type: integer
            currentStreakDays:
              type: integer
            drawChances:
              type: integer
            drawProgress:
              type: integer
    CheckInSession:
      type: object
      required: [id, status, startedAt, endedAt, durationSeconds, eligibleDurationSeconds, rewarded]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, completed, cancelled, invalidated]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        durationSeconds:
          type: [integer, "null"]
        eligibleDurationSeconds:
          type: [integer, "null"]
        rewarded:
          type: boolean
    CheckInFinishResult:
      type: object
      required: [session, reward]
      properties:
        session:
          $ref: "#/components/schemas/CheckInSession"
        reward:
          type: object
          required: [score, drawProgress, rewarded]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
    RewardSummary:
      type: object
      required: [score, drawProgressGranted, drawProgress, drawChancesGranted, achievementsUnlocked]
      properties:
        score:
          type: integer
        drawProgressGranted:
          type: integer
        drawProgress:
          type: integer
        drawChancesGranted:
          type: integer
        achievementsUnlocked:
          type: array
          items:
            type: string
    LeaderboardItem:
      type: object
      required: [rank, userId, displayName, score]
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        equippedBadge:
          type: [string, "null"]
        equippedTitle:
          type: [string, "null"]
        score:
          type: integer
    LeaderboardResponse:
      type: object
      required: [window, windowStart, items, currentUser]
      properties:
        window:
          type: string
          enum: [daily, weekly, monthly, all_time]
        windowStart:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardItem"
        currentUser:
          anyOf:
            - $ref: "#/components/schemas/LeaderboardItem"
            - type: "null"
    ProgressionGoal:
      type: object
      required: [code, title, description, completed]
      properties:
        code:
          type: string
          enum: [check_in, activity, bean_draw]
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
    ProgressionSummary:
      type: object
      required:
        - level
        - experience
        - currentLevelExperience
        - nextLevelExperience
        - progressPercent
        - currentStreakDays
        - longestStreakDays
        - lifetime
        - dailyGoals
      properties:
        level:
          type: integer
        experience:
          type: integer
        currentLevelExperience:
          type: integer
        nextLevelExperience:
          type: integer
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        currentStreakDays:
          type: integer
        longestStreakDays:
          type: integer
        lifetime:
          type: object
          required:
            - totalSessions
            - eligibleRestMinutes
            - completedActivities
            - collectedBeanTypes
            - unlockedAchievements
          properties:
            totalSessions:
              type: integer
            eligibleRestMinutes:
              type: integer
            completedActivities:
              type: integer
            collectedBeanTypes:
              type: integer
            unlockedAchievements:
              type: integer
        dailyGoals:
          type: object
          required: [date, completed, total, goals]
          properties:
            date:
              type: string
              format: date
            completed:
              type: integer
            total:
              type: integer
            goals:
              type: array
              items:
                $ref: "#/components/schemas/ProgressionGoal"
    Bean:
      type: object
      required: [id, code, name, rarity, description, quantity, owned]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        description:
          type: string
        quantity:
          type: integer
        owned:
          type: boolean
    BeanCollection:
      type: object
      required: [drawChances, drawProgress, beans]
      properties:
        drawChances:
          type: integer
        drawProgress:
          type: integer
        beans:
          type: array
          items:
            $ref: "#/components/schemas/Bean"
    BeanDrawResult:
      type: object
      required: [bean, duplicate, remainingDrawChances]
      properties:
        bean:
          $ref: "#/components/schemas/Bean"
        duplicate:
          type: boolean
        remainingDrawChances:
          type: integer
        achievementsUnlocked:
          type: array
          items:
            $ref: "#/components/schemas/AchievementUnlock"
    AchievementUnlock:
      type: object
      required: [id, code, name, unlockedAt, rewards]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        unlockedAt:
          type: string
          format: date-time
        rewards:
          type: object
          required: [score, drawProgress, drawChances, cosmetic]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChances:
              type: integer
            cosmetic:
              type: [string, "null"]
    Achievement:
      type: object
      required: [id, code, name, description, ruleType, rewardConfig, unlockedAt, rewardClaimedAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum: [first_checkin, streak, total_duration, activity_count, collection_count, weekly_top_rank]
        rewardConfig:
          type: object
          additionalProperties: true
        unlockedAt:
          type: [string, "null"]
          format: date-time
        rewardClaimedAt:
          type: [string, "null"]
          format: date-time
    AchievementList:
      type: object
      required: [achievements]
      properties:
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
    Cosmetic:
      type: object
      required: [id, code, name, description, cosmeticType, rarity]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        cosmeticType:
          type: string
          enum: [badge, title]
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
    OwnedCosmetic:
      allOf:
        - $ref: "#/components/schemas/Cosmetic"
        - type: object
          required: [unlockedAt, equipped]
          properties:
            unlockedAt:
              type: string
              format: date-time
            equipped:
              type: boolean
    CosmeticInventory:
      type: object
      required: [equippedBadge, equippedTitle, cosmetics]
      properties:
        equippedBadge:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        equippedTitle:
          anyOf:
            - $ref: "#/components/schemas/Cosmetic"
            - type: "null"
        cosmetics:
          type: array
          items:
            $ref: "#/components/schemas/OwnedCosmetic"
    CosmeticEquipResult:
      type: object
      required: [cosmetic]
      properties:
        cosmetic:
          $ref: "#/components/schemas/Cosmetic"
    ActivityAssignment:
      type: object
      required: [assignmentId, code, title, description, category, difficulty, status, rewardPreview, assignedAt, completedAt, expiresAt, rewarded]
      properties:
        assignmentId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        status:
          type: string
          enum: [active, completed, skipped, expired]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        assignedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        rewarded:
          type: boolean
        recommendationReason:
          type: string
          enum: [PREFERRED_CATEGORY, TRY_SOMETHING_NEW, MATCHES_HISTORY, AVAILABLE_NOW, ACTIVE_ASSIGNMENT]
    ActivityCatalogItem:
      type: object
      required: [templateId, code, title, description, category, difficulty, rewardPreview, eligible, cooldownRemainingSeconds, completedCount, lastCompletedAt, checkedAt]
      properties:
        templateId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [rest, game, office_theater, physical, imagination]
        difficulty:
          type: string
          enum: [easy, normal, hard]
        rewardPreview:
          type: object
          required: [score, drawProgress]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
        eligible:
          type: boolean
        cooldownRemainingSeconds:
          type: integer
          minimum: 0
        completedCount:
          type: integer
          minimum: 0
        lastCompletedAt:
          type: [string, "null"]
          format: date-time
        checkedAt:
          type: string
          format: date-time
    ActivityCatalog:
      type: object
      required: [selectedCategory, categories, items]
      properties:
        selectedCategory:
          type: [string, "null"]
          enum: [rest, game, office_theater, physical, imagination, null]
        categories:
          type: array
          items:
            type: string
            enum: [rest, game, office_theater, physical, imagination]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityCatalogItem"
    ActivityHistory:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityAssignment"
    ActivityCompleteResult:
      type: object
      required: [assignment, reward]
      properties:
        assignment:
          $ref: "#/components/schemas/ActivityAssignment"
        reward:
          type: object
          required: [score, drawProgress, drawChancesGranted, rewarded, reason, achievementsUnlocked]
          properties:
            score:
              type: integer
            drawProgress:
              type: integer
            drawChancesGranted:
              type: integer
            rewarded:
              type: boolean
            reason:
              type: [string, "null"]
            achievementsUnlocked:
              type: array
              items:
                $ref: "#/components/schemas/AchievementUnlock"
paths:
  /health:
    get:
      security: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Service health
  /v1/auth/me:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile summary
  /v1/me/profile:
    patch:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated profile
  /v1/check-ins:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Started check-in
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInSession"
                  error:
                    type: "null"
        "409":
          description: Active check-in already exists
  /v1/check-ins/{id}/finish:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Finished check-in with rewards
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CheckInFinishResult"
                  error:
                    type: "null"
        "404":
          description: Check-in not found
  /v1/check-ins/active:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Active check-in or null
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    anyOf:
                      - $ref: "#/components/schemas/CheckInSession"
                      - type: "null"
                  error:
                    type: "null"
  /v1/leaderboards:
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: window
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, all_time]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Leaderboard page and current user rank context
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaderboardResponse"
                  error:
                    type: "null"
  /v1/progression/summary:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: Authenticated user progression summary
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ProgressionSummary"
                  error:
                    type: "null"
  /v1/beans/collection:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      responses:
        "200":
          description: User bean collection
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/BeanCollection"
                  error:
                    type: "null"
  /v1/beans/draw:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Bean draw result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/BeanDrawResult"
                  error:
                    type: "null"
        "409":
          description: No draw chance available
  /v1/achievements:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Achievement list
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/AchievementList"
                  error:
                    type: "null"
  /v1/cosmetics:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Owned cosmetics
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CosmeticInventory"
                  error:
                    type: "null"
  /v1/cosmetics/{id}/equip:
    post:
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Equipped cosmetic
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/CosmeticEquipResult"
                  error:
                    type: "null"
  /v1/activities/random:
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                category:
                  type: string
                  enum: [rest, game, office_theater, physical, imagination]
      responses:
        "200":
          description: Assigned random activity
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ActivityAssignment"
                  error:
                    type: "null"
        "409":
          description: No eligible activity available
  /v1/activities/catalog:
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [rest, game, office_theater, physical, imagination]
      responses:
        "200":
          description: Activity catalog with current eligibility
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ActivityCatalog"
                  error:
                    type: "null"
  /v1/activities/history:
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Recent activity completion history
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ActivityHistory"
                  error:
                    type: "null"
  /v1/activities/{assignmentId}/complete:
    post:
      security:
        - bearerAuth: []
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Activity completion result
          content:
            application/json:
              schema:
                type: object
                required: [data, error]
                properties:
                  data:
                    $ref: "#/components/schemas/ActivityCompleteResult"
                  error:
                    type: "null"
        "404":
          description: Activity assignment not found
        "409":
          description: Activity expired
